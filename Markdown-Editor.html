      MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\$', '\$']],
          displayMath: [['$$$', '$$$'], ['\$\$\$', '\$\$\$']],
          processEscapes: true
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <script src="js/MathJax3/tex-chtml-full.js" id="MathJax-script"></script>
    <style>
      .MathJax { margin: 0; }
    </style>
    <!-- render -->
    <script>
      let replaceMap = new Map(),replaceArray = [],pre = 1,nowDisplay = "use",mathjaxVersion = 3;
      function renderMathJax(elem){
        if (!document.getElementById("olympic_mathjax_selector").checked){
          MathJax.typeset([elem]);
          return ;
        }
        let elem2 = document.getElementById("UserMathJaxIframe");
        if (!elem2){
          console.warn("自定义MathJax参数出错，回退为默认参数");
          MathJax.typeset(elem);
          return ;
        }
        let space = elem2.contentDocument;
        space.getElementById("input").value = elem.innerHTML;
        elem2.parentNode.style = "display: flex; flex: 1; min-width: 100%; min-height: 100%;";
        space.getElementById("input").click();
        elem.innerHTML = "";
      }
      function getNewReplace(match,content){
        for (let i = pre;;i++){
          if (!content.match(`$latex_${i}$`)){
            replaceMap.set(`$latex_${i}$`,match);
            replaceArray.push(i);
            pre = i + 1;
            return `$latex_${i}$`;
          }
        }
      }
      function go(mdText){
        if (!document.getElementById("olympic_mathjax_selector").checked){
          document.getElementById("UserMathJaxSpace").style = "display: none;";
        }
        return mdText.replace(/`(.*?)`|\$\$\$(.*?)\$\$\$|\$(.*?)\$/g, ((match, group) => {
          if (match[0] != '`'){
//            alert(match);
            return getNewReplace(match,mdText);
          }
          else
            return match;
        }));
      }
      function back(elem){
        elem.innerHTML = elem.innerHTML.replace(/\$(.*?)\$/g, ((match, group) => {
          if (!replaceMap.has(match))
            return match;
          return replaceMap.get(match);
        }));
      }
      function setHover(elem){
        if (!document.getElementById("useHover").checked) return ;
        function add1(elem2){
          elem2.style.transition = "transform 0.2s ease";
          elem2.style.display = "inline-block";
          function trans1(){
            elem2.style.transform = "scale(2)";
          }
          elem2.addEventListener("mouseover",trans1);
          function trans2(){
            elem2.style.transform = "scale(1)";
          }
          elem2.addEventListener("mouseout",trans2);
        }
        function add2(elem2){
          elem2.style.transition = "transform 0.2s ease";
 
          if (!elem2.getAttribute("display"))
            elem2.style.display = "inline-block";
          function trans1(){
            elem2.style.transform = "scale(2)";
          }
          elem2.addEventListener("mouseover",trans1);
          function trans2(){
            elem2.style.transform = "scale(1)";
          }
          elem2.addEventListener("mouseout",trans2);
        }
        elem.querySelectorAll(".katex").forEach(add1);
        elem.querySelectorAll("mjx-container").forEach(add2);
        replaceMap = new Map();
        replaceArray = [];
        pre = 1;//*/
      }
      function renderMarkdownKatex(mdText, containerId, display="auto") {
        if (display == "auto")
          display = nowDisplay;
        // 插入页面
        document.getElementById(containerId).innerHTML = go(mdText);
        // Markdown -> HTML
        document.getElementById(containerId).innerHTML = marked.parse(document.getElementById(containerId).innerHTML);
        // 还原LaTeX
        back(document.getElementById(containerId));
        if (!document.getElementById("useLaTeX_selector").checked) return ;
        // KaTeX 自动渲染
        renderMathInElement(document.getElementById(containerId), {
          delimiters: [
            { left: "$$$", right: "$$$", display: true },
            { left: "$", right: "$", display: false }
          ],
          throwOnError: false
        });
        // 设置放大器
        if (display != "close")
          setHover(document.getElementById(containerId)),setHover(document.getElementById("UserMathJaxIframe").contentDocument.getElementById("output"));
      }
      function renderMarkdownMathJax(mdText, containerId, display="auto") {
        if (display == "auto")
          display = nowDisplay;
        // 插入页面
        document.getElementById(containerId).innerHTML = go(mdText);
        // Markdown -> HTML
        document.getElementById(containerId).innerHTML = marked.parse(document.getElementById(containerId).innerHTML);
        // 还原LaTeX
        back(document.getElementById(containerId));
        if (!document.getElementById("useLaTeX_selector").checked) return ;
        // MathJax 自动渲染
        renderMathJax(document.getElementById(containerId)),setHover(document.getElementById("UserMathJaxIframe").contentDocument.getElementById("output"));
        // 设置放大器
        if (display != "close")
          setHover(document.getElementById(containerId));
      }
      let renderType = "Katex",otherType = "MathJax";
      function renderMarkdown(mdText, containerId){
        if (renderType == "Katex") renderMarkdownKatex(mdText,containerId);
        else if (renderType == "MathJax") renderMarkdownMathJax(mdText,containerId);
        else throw new Error("不可达");
      }
    </script>

let startX, startLeftWidth,allWidth;

function onMouseDown(e) {
  e.preventDefault();
  
  startX = e.clientX;
  startLeftWidth = leftPanel.offsetWidth;
  allWidth = leftPanel.offsetWidth + rightPanel.offsetWidth;
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
}

function onMouseMove(e) {
  const deltaX = e.clientX - startX;
  
  let newLeftWidth = startLeftWidth + deltaX;
  
  const minWidth = 100;
  const maxWidth = allWidth - minWidth;
  newLeftWidth = Math.max(minWidth, Math.min(newLeftWidth, maxWidth));

  leftPanel.style.width = `${newLeftWidth}px`;
  rightPanel.style.width = `${allWidth - newLeftWidth}px`;
}

function onMouseUp() {
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
}

resizer.addEventListener('mousedown', onMouseDown);

  <script>
    async function saveAs(content, name, tp) {
      const mimeType = `text/${tp}`;
      const blob = new Blob([content], { type: mimeType });

      if (window.showSaveFilePicker) {
        try {
          const handle = await window.showSaveFilePicker({
            suggestedName: `untitled.${name}`,
            types: [{
              description: 'Text file',
              accept: { [mimeType]: [`.${name.split('.').pop() || 'txt'}`] }
            }]
          });
          const writable = await handle.createWritable();
          await writable.write(blob);
          await writable.close();
          handleMap.set(nowid,handle);
          streamMap.set(nowid,await handle.createWritable());
          stream = await handle.createWritable();
          histhandle = handle;
          let elem = document.getElementById(`file-${nowid}_close`);
          elem.remove();
          document.getElementById(`file-${nowid}_name`).innerHTML = handle.name;
          document.getElementById(`file-${nowid}_name`).append(elem);
        } catch (err) {
          if (err.name !== 'AbortError') {
            alert("错误：无法保存");
          }
        }
      } else {
        alert("错误：无法保存");
      }
    }

        stream = await handle.createWritable();

      } catch (err) {
        if (err != `AbortError: Failed to execute 'showOpenFilePicker' on 'Window': The user aborted a request.`){
          alert(`错误：无法打开:${err}`);
